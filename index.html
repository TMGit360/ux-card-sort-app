<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Card Sort Tool</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    .box {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.10);
      overflow: hidden;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .accent {
      height: 5px;
      background: #2563eb;
    }
    .inner {
      padding: 52px 40px 48px;
    }
    h1 {
      margin: 0 0 32px;
      font-size: 1.75rem;
      letter-spacing: -0.01em;
    }
    a.btn {
      display: inline-block;
      padding: 13px 32px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      transition: background 0.15s;
    }
    a.btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="box">
    <div class="accent"></div>
    <div class="inner">
      <h1>Card Sort Tool</h1>
      <a class="btn" href="admin.html">Go to Admin →</a>
    </div>
  </div>
</body>
</html>
