<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Card Sort</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #f8fafc;
        color: #111827;
      }
      * { box-sizing: border-box; }
      .main-layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        grid-template-rows: auto 1fr;
        gap: 12px;
        grid-template-areas:
          "top top"
          "left right";
        margin: 12px;
      }
      .toolbar, .panel {
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);
      }
      .toolbar {
        grid-area: top;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        flex-wrap: wrap;
      }
      .toolbar-actions { display: flex; gap: 10px; flex-wrap: wrap; }
      .toolbar button {
        border: 0;
        background: #2563eb;
        color: #fff;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 16px;
        cursor: pointer;
      }
      .toolbar button.secondary { background: #0f172a; }
      .panel { padding: 14px; }
      .uncategorized-cards { grid-area: left; }
      .categories { grid-area: right; }
      .grid { position: relative; }
      .item { display: block; position: absolute; }
      .item.muuri-item-dragging { z-index: 3; }
      .item.muuri-item-releasing { z-index: 2; }
      .item.muuri-item-hidden { z-index: 0; }
      .item-content { position: relative; width: 100%; height: 100%; }
      .uncategorized-cards .item,
      .category-cards .item { width: 100%; }
      .card {
        width: 220px;
        max-width: calc(100vw - 70px);
        margin: 6px;
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 16px;
        background: #fef08a;
        box-shadow: 0 2px 10px rgba(146, 64, 14, 0.18);
        cursor: grab;
      }
      .muuri-item-placeholder .card {
        pointer-events: none;
        background: transparent;
        border: 2px dashed #94a3b8;
        color: #64748b;
        box-shadow: none;
      }
      .category {
        margin: 6px 12px 24px 6px;
        padding: 10px;
        background: #fff;
        border: 1px solid #dbeafe;
        border-radius: 14px;
      }
      .category .title {
        width: 100%;
        max-width: 280px;
        padding: 8px 6px;
        margin-bottom: 10px;
        border: 0;
        border-bottom: 1px solid #bfdbfe;
        font-size: 18px;
      }
      .category-cards .grid { min-height: 100px; }
      .category-drag-handle {
        width: 100%;
        height: 16px;
        background: radial-gradient(#cbd5e1 35%, transparent 36%) 0 0;
        background-size: 8px 8px;
        cursor: grab;
        margin-bottom: 8px;
      }
      .status { min-height: 22px; color: #475569; }
      .error { color: #b91c1c; }
      .success { color: #166534; }
      .start-gate {
        margin: 12px;
        padding: 18px;
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);
      }
      .start-gate.hidden { display: none; }
      .start-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .start-gate label { display: block; font-weight: 600; margin-bottom: 6px; }
      .start-gate input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        font: inherit;
      }
      .start-gate button {
        margin-top: 14px;
        border: 0;
        background: #2563eb;
        color: #fff;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 16px;
        cursor: pointer;
      }
      @media (max-width: 860px) {
        .main-layout {
          grid-template-columns: 1fr;
          grid-template-areas:
            "top"
            "left"
            "right";
        }
      }
    </style>
  </head>
  <body>
    <section class="start-gate hidden" id="start-gate">
      <h2 id="start-gate-title">Start card sort</h2>
      <p id="start-gate-description">Enter your name to begin.</p>
      <form id="start-form">
        <div class="start-grid">
          <div>
            <label for="participant-first-name">First name</label>
            <input id="participant-first-name" required />
          </div>
          <div>
            <label for="participant-last-name">Last name</label>
            <input id="participant-last-name" required />
          </div>
        </div>
        <button type="submit" id="start-form-button">Start card sort</button>
        <div class="status" id="start-form-status"></div>
      </form>
    </section>
    <div class="main-layout" id="main-layout">
      <div class="toolbar">
        <div>
          <strong id="study-heading">Card Sort</strong>
          <div class="status" id="status">Load a session to begin.</div>
        </div>
        <div class="toolbar-actions">
          <button class="btn-create-category">Create a new category</button>
          <button class="secondary btn-submit-result">Submit result</button>
          <button class="btn-export-result">Export JSON</button>
        </div>
      </div>
      <div class="panel uncategorized-cards">
        <h3>Unsorted cards</h3>
        <div class="grid"></div>
      </div>
      <div class="panel categories">
        <h3>Categories</h3>
        <div class="grid"></div>
      </div>
    </div>

    <template class="card-template">
      <div class="item"><div class="item-content"><div class="card"></div></div></div>
    </template>
    <template class="category-template">
      <div class="item">
        <div class="item-content">
          <div class="category">
            <div class="category-drag-handle"></div>
            <input class="title" placeholder="Type a name" />
            <div class="category-cards"><div class="grid"></div></div>
          </div>
        </div>
      </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="muuri-0.9.5.min.js"></script>
    <script src="pako-2.0.4.min.js"></script>
    <script src="common-scripts.js"></script>
    <script src="supabase-config.js"></script>
    <script>
      const {
        settingsDefaults,
        loadSettings,
        saveSettings,
        reservedKeys,
        shuffleArray,
        downloadJson,
        debounce,
      } = window.CardSortCommon;

      const config = window.CARD_SORT_SUPABASE_CONFIG || {};
      const hasSupabaseConfig = Boolean(
        config.supabaseUrl &&
        config.supabaseAnonKey &&
        !config.supabaseUrl.includes('YOUR_PROJECT_ID')
      );

      const supabaseClient = hasSupabaseConfig
        ? window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey)
        : null;

      const statusEl = document.getElementById('status');
      const studyHeading = document.getElementById('study-heading');
      const mainLayout = document.getElementById('main-layout');
      const startGate = document.getElementById('start-gate');
      const startGateTitle = document.getElementById('start-gate-title');
      const startGateDescription = document.getElementById('start-gate-description');
      const startForm = document.getElementById('start-form');
      const startFormButton = document.getElementById('start-form-button');
      const startFormStatus = document.getElementById('start-form-status');
      const buttonCreateCategory = document.querySelector('.btn-create-category');
      const buttonSubmitResult = document.querySelector('.btn-submit-result');
      const buttonExportResult = document.querySelector('.btn-export-result');
      const cardTemplate = document.querySelector('.card-template');
      const categoryTemplate = document.querySelector('.category-template');
      const uncategorizedGridElement = document.querySelector('.uncategorized-cards .grid');
      const categoriesGridElement = document.querySelector('.categories .grid');
      const settings = Object.assign({}, settingsDefaults);

      let session = null;
      let data = {};
      const params = new URLSearchParams(window.location.search);
      const publicToken = params.get('token');
      let categoriesGrid;
      let uncategorizedCardsGrid;
      const cardGrids = [];
      const cardImageRegex = /(https?:\/\/\S+\.(?:jpg|jpeg|png|gif|webp))/i;
      let createStarterCategories = false;
      let boardReady = false;

      function setToolbarEnabled(enabled) {
        buttonCreateCategory.disabled = !enabled;
        buttonSubmitResult.disabled = !enabled;
        buttonExportResult.disabled = !enabled;
      }

      function getSessionStorageKey(token) {
        return token ? 'cardSortSession:' + token : 'cardSortSession';
      }

      function persistSession(nextSession) {
        if (!nextSession) return;
        const serialized = JSON.stringify(nextSession);
        const scopedKey = getSessionStorageKey(nextSession.public_token || publicToken);
        sessionStorage.setItem(scopedKey, serialized);
        localStorage.setItem(scopedKey, serialized);
        sessionStorage.setItem('cardSortSession', serialized);
        localStorage.setItem('cardSortSession', serialized);
      }

      async function ensureMuuriLoaded() {
        if (window.Muuri) return;
        await new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/muuri@0.9.5/dist/muuri.min.js';
          script.onload = resolve;
          script.onerror = () => reject(new Error('Unable to load the drag-and-drop library Muuri.'));
          document.head.appendChild(script);
        });
        if (!window.Muuri) {
          throw new Error('The drag-and-drop library Muuri is unavailable on this deployment.');
        }
      }

      setToolbarEnabled(false);

      buttonCreateCategory.addEventListener('click', () => {
        if (!boardReady) {
          setStatus('The study board has not loaded yet.', 'error');
          return;
        }
        if (settings.allowCategoryEditing === false) {
          setStatus('This study uses fixed categories, so new categories cannot be added.', 'error');
          return;
        }
        createCategory('', []);
      });
      buttonSubmitResult.addEventListener('click', submitResult);
      buttonExportResult.addEventListener('click', exportResult);

      function setStatus(message, type = '') {
        statusEl.textContent = message;
        statusEl.className = 'status';
        if (type) statusEl.classList.add(type);
      }

      function setStartFormStatus(message, type = '') {
        startFormStatus.textContent = message;
        startFormStatus.className = 'status';
        if (type) startFormStatus.classList.add(type);
      }

      function showStartGate(title, description) {
        startGateTitle.textContent = title;
        startGateDescription.textContent = description;
        startGate.classList.remove('hidden');
        mainLayout.style.display = 'none';
      }

      function hideStartGate() {
        startGate.classList.add('hidden');
        mainLayout.style.display = '';
      }

      function clearStoredSession() {
        const scopedKey = getSessionStorageKey(publicToken);
        sessionStorage.removeItem(scopedKey);
        localStorage.removeItem(scopedKey);
        sessionStorage.removeItem('cardSortSession');
        localStorage.removeItem('cardSortSession');
      }

      function normalizeArray(value) {
        if (Array.isArray(value)) return value;
        if (typeof value === 'string') {
          try {
            const parsed = JSON.parse(value);
            return Array.isArray(parsed) ? parsed : [];
          } catch (_error) {
            return value.trim() ? [value] : [];
          }
        }
        return [];
      }

      function getStoredSession() {
        const scopedKey = getSessionStorageKey(publicToken);
        const rawSession = sessionStorage.getItem(scopedKey) || localStorage.getItem(scopedKey) || sessionStorage.getItem('cardSortSession') || localStorage.getItem('cardSortSession');
        if (!rawSession) return null;

        try {
          const parsed = JSON.parse(rawSession);
          if (publicToken && parsed.public_token !== publicToken) return null;
          parsed.cards = normalizeArray(parsed.cards);
          parsed.categories = normalizeArray(parsed.categories);
          return parsed;
        } catch (_error) {
          clearStoredSession();
          return null;
        }
      }

      async function loadPublicStudyContext() {
        if (!supabaseClient || !publicToken) return null;

        const { data, error } = await supabaseClient.rpc('get_public_study_context', {
          p_public_token: publicToken
        });

        if (error) throw error;
        return Array.isArray(data) ? data[0] : data;
      }

      async function startParticipantSession(firstName, lastName) {
        if (!supabaseClient || !publicToken) {
          throw new Error('This study link is not configured correctly.');
        }

        const { data, error } = await supabaseClient.rpc('start_participant_session', {
          p_public_token: publicToken,
          p_first_name: firstName,
          p_last_name: lastName,
        });

        if (error) throw error;

        const nextSession = Array.isArray(data) ? data[0] : data;
        nextSession.cards = normalizeArray(nextSession.cards);
        nextSession.categories = normalizeArray(nextSession.categories);
        persistSession(nextSession);
        return nextSession;
      }

      function buildDataFromTemplate(template) {
        const templateSettings = {
          allowCategoryEditing: template.allow_category_editing !== false,
          isRandomized: Boolean(template.is_randomized),
        };
        Object.assign(settings, templateSettings);
        const initialCards = settings.isRandomized ? shuffleArray(template.cards || []) : [...(template.cards || [])];
        data = { '#': initialCards, '?': saveSettings(settings) };
        for (const category of (template.categories || [])) {
          data[category] = [];
        }
      }

      startForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const firstName = document.getElementById('participant-first-name').value.trim();
        const lastName = document.getElementById('participant-last-name').value.trim();

        if (!firstName || !lastName) {
          setStartFormStatus('Enter your first and last name to continue.', 'error');
          return;
        }

        try {
          startFormButton.disabled = true;
          setStartFormStatus('Starting session...');
          session = await startParticipantSession(firstName, lastName);
          hideStartGate();
          await bootFromSession();
          setStatus('Drag cards into categories, then submit when finished.');
        } catch (error) {
          setStartFormStatus(error.message || 'Unable to start this study.', 'error');
        } finally {
          startFormButton.disabled = false;
        }
      });

      function initGrids() {
        if (!window.Muuri) {
          throw new Error('The drag-and-drop board library did not load.');
        }
        categoriesGrid = new Muuri(categoriesGridElement, {
          dragEnabled: true,
          dragHandle: '.category-drag-handle',
        });

        uncategorizedCardsGrid = new Muuri(uncategorizedGridElement, {
          dragEnabled: true,
          dragSort: () => cardGrids,
          dragPlaceholder: {
            enabled: true,
            createElement: (item) => item.getElement().cloneNode(true),
          },
          dragContainer: document.body,
        });

        cardGrids.push(uncategorizedCardsGrid);

        uncategorizedCardsGrid.on('dragEnd', () => {
          debouncedUpdateData();
          categoriesGrid.refreshItems().layout();
        });

        window.addEventListener(
          'resize',
          debounce(() => categoriesGrid.refreshItems().layout(), Muuri.defaultOptions.layoutOnResize)
        );
      }

      function createCard(text, categoryGrid) {
        const targetGrid = categoryGrid || uncategorizedCardsGrid;
        const itemElement = document.importNode(cardTemplate.content.children[0], true);
        const cardElement = itemElement.querySelector('.card');
        const hasImage = text.match(cardImageRegex);

        if (hasImage) {
          const [textBefore, imageUrl, textAfter] = text.split(cardImageRegex);
          const cardChildElements = [];

          if (textBefore.trim()) {
            const span = document.createElement('span');
            span.textContent = textBefore;
            cardChildElements.push(span);
          }

          const imageElement = document.createElement('img');
          imageElement.src = imageUrl;
          imageElement.style.width = '100%';
          imageElement.style.borderRadius = '8px';
          imageElement.onload = () => targetGrid.refreshItems().layout();
          cardChildElements.push(imageElement);

          if (textAfter.trim()) {
            const span = document.createElement('span');
            span.textContent = textAfter;
            cardChildElements.push(span);
          }

          cardElement.replaceChildren(...cardChildElements);
        } else {
          cardElement.textContent = text;
        }

        cardElement.setAttribute('data-text', text);
        targetGrid.show(targetGrid.add([itemElement], { active: false }));
      }

      function createCategory(name, cards) {
        const itemElement = document.importNode(categoryTemplate.content.children[0], true);
        const titleInput = itemElement.querySelector('.title');
        titleInput.value = name || '';
        titleInput.disabled = settings.allowCategoryEditing === false;
        titleInput.addEventListener('input', debouncedUpdateData);

        categoriesGrid.show(
          categoriesGrid.add([itemElement], { active: false, index: name ? -1 : 0 }),
          {
            onFinish: () => {
              const categoryGrid = new Muuri(itemElement.querySelector('.grid'), {
                dragEnabled: true,
                dragSort: () => cardGrids,
                dragPlaceholder: {
                  enabled: true,
                  createElement: (item) => item.getElement().cloneNode(true),
                },
                dragContainer: document.body,
              });

              categoryGrid.on('dragReleaseEnd', () => {
                categoryGrid.synchronize();
                debouncedUpdateData();
                categoriesGrid.refreshItems().layout();
              });

              cardGrids.push(categoryGrid);
              for (const text of cards || []) {
                createCard(text, categoryGrid);
              }
            },
          }
        );
      }

      function getUniqueCategoryName(originalName, result) {
        let candidateName = originalName;
        let counter = 1;
        while (candidateName in result) {
          counter += 1;
          candidateName = `${originalName} (${counter})`;
        }
        return candidateName;
      }

      function updateData() {
        let untitledCounter = 0;
        const nextData = {};

        for (const categoryElement of document.querySelectorAll('.category')) {
          let categoryName = categoryElement.querySelector('.title').value.trim();

          if (!categoryName) {
            untitledCounter += 1;
            categoryName = `(Untitled ${untitledCounter})`;
          }

          if (categoryName in nextData) {
            categoryName = getUniqueCategoryName(categoryName, nextData);
          }

          nextData[categoryName] = [];

          for (const cardElement of categoryElement.querySelectorAll('.card')) {
            nextData[categoryName].push(cardElement.getAttribute('data-text'));
          }
        }

        nextData['#'] = [];
        for (const cardElement of document.querySelectorAll('.uncategorized-cards .card')) {
          nextData['#'].push(cardElement.getAttribute('data-text'));
        }

        nextData['?'] = saveSettings(settings);
        data = nextData;
      }

      const debouncedUpdateData = debounce(updateData, 150);

      function getCleanResult() {
        updateData();
        const cleanedData = {};
        for (const [key, value] of Object.entries(data)) {
          if (reservedKeys.includes(key)) continue;
          cleanedData[key] = value;
        }
        return cleanedData;
      }

      async function submitResult() {
        if (!supabaseClient || !session) {
          setStatus('Supabase session not available.', 'error');
          return;
        }

        try {
          setStatus('Submitting result...');
          const resultJson = getCleanResult();

          const { error } = await supabaseClient.rpc('submit_card_sort', {
            p_public_token: session.public_token,
            p_participant_id: session.participant_id,
            p_template_id: session.template_id,
            p_result_json: resultJson,
          });

          if (error) throw error;

          setStatus('Result submitted successfully.', 'success');
          sessionStorage.removeItem('cardSortSession');
          localStorage.removeItem('cardSortSession');
        } catch (error) {
          setStatus(error.message || 'Unable to submit the result.', 'error');
        }
      }

      function exportResult() {
        const resultJson = getCleanResult();
        downloadJson(`card-sort-${session?.participant_id || 'result'}.json`, resultJson);
      }

      function resetBoard() {
        boardReady = false;
        setToolbarEnabled(false);
        categoriesGridElement.innerHTML = '';
        uncategorizedGridElement.innerHTML = '';
        cardGrids.length = 0;
        categoriesGrid = null;
        uncategorizedCardsGrid = null;
        data = {};
      }

      async function bootFromSession() {
        await ensureMuuriLoaded();
        session.cards = normalizeArray(session.cards);
        session.categories = normalizeArray(session.categories);
        persistSession(session);
        studyHeading.textContent = session.study_name + ' · ' + session.participant_name;
        resetBoard();
        buildDataFromTemplate(session);
        initGrids();

        for (const categoryName of Object.keys(data)) {
          if (reservedKeys.includes(categoryName) || categoryName === '#') continue;
          createCategory(categoryName, data[categoryName]);
        }

        for (const text of data['#'] || []) {
          createCard(text, uncategorizedCardsGrid);
        }

        if (document.querySelectorAll('.category').length === 0 && (createStarterCategories || ((data['#'] || []).length === 0 && settings.allowCategoryEditing !== false))) {
          createCategory();
          createCategory();
        }

        boardReady = true;
        setToolbarEnabled(true);
      }

      async function boot() {
        const legacyHash = window.location.hash.slice(1);
        await ensureMuuriLoaded();

        if (legacyHash) {
          const legacyData = await window.CardSortCommon.loadFromString(legacyHash);
          const legacySettings = loadSettings(legacyData);
          Object.assign(settings, legacySettings);
          session = {
            public_token: null,
            participant_id: null,
            template_id: null,
            study_name: 'Legacy card sort',
            participant_name: 'Legacy session',
          };
          studyHeading.textContent = 'Legacy card sort';
          data = legacyData;
          if (!Array.isArray(data['#'])) data['#'] = [];
          if (!data['?']) data['?'] = saveSettings(settings);
          if (Object.keys(data).filter((key) => !reservedKeys.includes(key) && key !== '#').length === 0 && settings.allowCategoryEditing !== false) {
            createStarterCategories = true;
          }
          initGrids();

          for (const categoryName of Object.keys(data)) {
            if (reservedKeys.includes(categoryName) || categoryName === '#') continue;
            createCategory(categoryName, data[categoryName]);
          }

          for (const text of data['#'] || []) {
            createCard(text, uncategorizedCardsGrid);
          }

          if (document.querySelectorAll('.category').length === 0 && (createStarterCategories || ((data['#'] || []).length === 0 && settings.allowCategoryEditing !== false))) {
            createCategory();
            createCategory();
          }

          boardReady = true;
          setToolbarEnabled(true);
          setStatus('Drag cards into categories, then submit when finished.');
          return;
        }

        if (!publicToken) {
          setStatus('This page expects a study link with a token.', 'error');
          setToolbarEnabled(false);
          return;
        }

        session = getStoredSession();
        if (session) {
          hideStartGate();
          await bootFromSession();
          boardReady = true;
          setToolbarEnabled(true);
          setStatus('Drag cards into categories, then submit when finished.');
          return;
        }

        clearStoredSession();

        try {
          const studyContext = await loadPublicStudyContext();
          if (!studyContext) {
            setStatus('This study link is invalid or inactive.', 'error');
            buttonSubmitResult.disabled = true;
            buttonCreateCategory.disabled = true;
            return;
          }

          showStartGate(
            studyContext.study_name || 'Start card sort',
            'Enter your first and last name to begin this study.'
          );
          setStartFormStatus('');
          document.getElementById('participant-first-name').focus();
          setStatus('Enter your name to begin.');
        } catch (error) {
          setStatus(error.message || 'Unable to load this study.', 'error');
          setToolbarEnabled(false);
        }
      }

      window.addEventListener('error', (event) => {
        const message = event?.error?.message || event?.message || 'An unexpected error occurred while loading the study.';
        setStatus(message, 'error');
      });

      boot().catch((error) => {
        setStatus(error.message || 'Unable to load this study.', 'error');
        setToolbarEnabled(false);
      });
    </script>
  </body>
</html>
