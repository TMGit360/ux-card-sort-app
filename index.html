<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Card Sort Tool</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    .box {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.10);
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 1.6rem; }
    p  { color: #64748b; margin: 0 0 28px; line-height: 1.6; }
    a.btn {
      display: inline-block;
      padding: 13px 28px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      transition: background 0.15s;
    }
    a.btn:hover { background: #1d4ed8; }
    .note {
      margin-top: 22px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Card Sort Tool</h1>
    <p>Participants use a study-specific link shared by the administrator.<br />Administrators can create and manage studies here.</p>
    <a class="btn" href="admin.html">Go to Admin →</a>
    <p class="note">Participant links look like <code>sort.html?token=…</code></p>
  </div>
</body>
</html>
