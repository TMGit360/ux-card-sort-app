<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Card Sort</title>
    <style>
      :root {
        --bg: #f8fafc;
        --panel: #ffffff;
        --text: #111827;
        --muted: #475569;
        --line: #cbd5e1;
        --blue: #2563eb;
        --dark: #0f172a;
        --yellow: #fef08a;
        --yellow-shadow: rgba(146, 64, 14, 0.18);
      }
      html, body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      * { box-sizing: border-box; }
      .main-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        grid-template-rows: auto 1fr;
        gap: 12px;
        grid-template-areas:
          "top top"
          "left right";
        margin: 12px;
      }
      .toolbar, .panel, .start-gate {
        background: var(--panel);
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);
      }
      .toolbar {
        grid-area: top;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        flex-wrap: wrap;
      }
      .toolbar-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 16px;
        cursor: pointer;
      }
      .toolbar button,
      .start-gate button {
        background: var(--blue);
        color: #fff;
      }
      .toolbar button.secondary {
        background: var(--dark);
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }
      .panel { padding: 14px; }
      .uncategorized-cards { grid-area: left; }
      .categories { grid-area: right; }
      .status { min-height: 22px; color: var(--muted); }
      .error { color: #b91c1c; }
      .success { color: #166534; }
      .column-dropzone {
        min-height: 180px;
        border: 2px dashed transparent;
        border-radius: 12px;
        padding: 6px;
        transition: border-color 0.12s ease, background 0.12s ease;
      }
      .column-dropzone.drag-over {
        border-color: #93c5fd;
        background: #eff6ff;
      }
      .cards-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .card {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 16px;
        line-height: 1.35;
        background: var(--yellow);
        box-shadow: 0 2px 10px var(--yellow-shadow);
        cursor: grab;
        user-select: none;
      }
      .card.dragging {
        opacity: 0.6;
      }
      .card img {
        width: 100%;
        border-radius: 8px;
        display: block;
        margin: 6px 0;
      }
      .categories-board {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 14px;
        align-items: start;
      }
      .category {
        background: #fff;
        border: 1px solid #dbeafe;
        border-radius: 14px;
        padding: 10px;
      }
      .category .title {
        width: 100%;
        padding: 8px 6px;
        margin-bottom: 10px;
        border: 0;
        border-bottom: 1px solid #bfdbfe;
        font-size: 18px;
        background: transparent;
      }
      .category-meta {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 8px;
      }
      .empty-note {
        color: #64748b;
        font-size: 14px;
        padding: 6px 2px;
      }
      .start-gate {
        margin: 12px;
        padding: 18px;
      }
      .start-gate.hidden { display: none; }
      .start-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .start-gate label { display: block; font-weight: 600; margin-bottom: 6px; }
      .start-gate input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        font: inherit;
      }
      @media (max-width: 860px) {
        .main-layout {
          grid-template-columns: 1fr;
          grid-template-areas:
            "top"
            "left"
            "right";
        }
        .start-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <section class="start-gate hidden" id="start-gate">
      <h2 id="start-gate-title">Start card sort</h2>
      <p id="start-gate-description">Enter your name to begin.</p>
      <form id="start-form">
        <div class="start-grid">
          <div>
            <label for="participant-first-name">First name</label>
            <input id="participant-first-name" required />
          </div>
          <div>
            <label for="participant-last-name">Last name</label>
            <input id="participant-last-name" required />
          </div>
        </div>
        <button type="submit" id="start-form-button">Start card sort</button>
        <div class="status" id="start-form-status"></div>
      </form>
    </section>

    <div class="main-layout" id="main-layout">
      <div class="toolbar">
        <div>
          <strong id="study-heading">Card Sort</strong>
          <div class="status" id="status">Load a session to begin.</div>
        </div>
        <div class="toolbar-actions">
          <button class="btn-create-category">Create a new category</button>
          <button class="secondary btn-submit-result">Submit result</button>
          <button class="btn-export-result">Export JSON</button>
        </div>
      </div>

      <div class="panel uncategorized-cards">
        <h3>Unsorted cards</h3>
        <div class="column-dropzone" id="uncategorized-dropzone" data-category="#">
          <div class="cards-list" id="uncategorized-list"></div>
        </div>
      </div>

      <div class="panel categories">
        <h3>Categories</h3>
        <div class="categories-board" id="categories-board"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="pako-2.0.4.min.js"></script>
    <script src="common-scripts.js"></script>
    <script src="supabase-config.js"></script>
    <script>
      const {
        settingsDefaults,
        loadSettings,
        saveSettings,
        reservedKeys,
        shuffleArray,
        downloadJson,
      } = window.CardSortCommon;

      const config = window.CARD_SORT_SUPABASE_CONFIG || {};
      const hasSupabaseConfig = Boolean(
        config.supabaseUrl &&
        config.supabaseAnonKey &&
        !config.supabaseUrl.includes('YOUR_PROJECT_ID')
      );

      const supabaseClient = hasSupabaseConfig
        ? window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey)
        : null;

      const statusEl = document.getElementById('status');
      const studyHeading = document.getElementById('study-heading');
      const mainLayout = document.getElementById('main-layout');
      const startGate = document.getElementById('start-gate');
      const startGateTitle = document.getElementById('start-gate-title');
      const startGateDescription = document.getElementById('start-gate-description');
      const startForm = document.getElementById('start-form');
      const startFormButton = document.getElementById('start-form-button');
      const startFormStatus = document.getElementById('start-form-status');
      const buttonCreateCategory = document.querySelector('.btn-create-category');
      const buttonSubmitResult = document.querySelector('.btn-submit-result');
      const buttonExportResult = document.querySelector('.btn-export-result');
      const uncategorizedList = document.getElementById('uncategorized-list');
      const categoriesBoard = document.getElementById('categories-board');
      const params = new URLSearchParams(window.location.search);
      const publicToken = params.get('token');
      const settings = Object.assign({}, settingsDefaults);
      const cardImageRegex = /(https?:\/\/\S+\.(?:jpg|jpeg|png|gif|webp))/i;

      let session = null;
      let data = {};
      let boardReady = false;
      let dragCardId = null;
      let untitledSeed = 0;

      function setToolbarEnabled(enabled) {
        buttonCreateCategory.disabled = !enabled;
        buttonSubmitResult.disabled = !enabled;
        buttonExportResult.disabled = !enabled;
      }

      function setStatus(message, type = '') {
        statusEl.textContent = message;
        statusEl.className = 'status';
        if (type) statusEl.classList.add(type);
      }

      function setStartFormStatus(message, type = '') {
        startFormStatus.textContent = message;
        startFormStatus.className = 'status';
        if (type) startFormStatus.classList.add(type);
      }

      function showStartGate(title, description) {
        startGateTitle.textContent = title;
        startGateDescription.textContent = description;
        startGate.classList.remove('hidden');
        mainLayout.style.display = 'none';
      }

      function hideStartGate() {
        startGate.classList.add('hidden');
        mainLayout.style.display = '';
      }

      function getSessionStorageKey(token) {
        return token ? 'cardSortSession:' + token : 'cardSortSession';
      }

      function persistSession(nextSession) {
        if (!nextSession) return;
        const serialized = JSON.stringify(nextSession);
        const scopedKey = getSessionStorageKey(nextSession.public_token || publicToken);
        sessionStorage.setItem(scopedKey, serialized);
        localStorage.setItem(scopedKey, serialized);
        sessionStorage.setItem('cardSortSession', serialized);
        localStorage.setItem('cardSortSession', serialized);
      }

      function clearStoredSession() {
        const scopedKey = getSessionStorageKey(publicToken);
        sessionStorage.removeItem(scopedKey);
        localStorage.removeItem(scopedKey);
        sessionStorage.removeItem('cardSortSession');
        localStorage.removeItem('cardSortSession');
      }

      function normalizeArray(value) {
        if (Array.isArray(value)) return value;
        if (typeof value === 'string') {
          try {
            const parsed = JSON.parse(value);
            return Array.isArray(parsed) ? parsed : [];
          } catch (_error) {
            return value.trim() ? [value] : [];
          }
        }
        return [];
      }

      function getStoredSession() {
        const scopedKey = getSessionStorageKey(publicToken);
        const rawSession = sessionStorage.getItem(scopedKey) || localStorage.getItem(scopedKey) || sessionStorage.getItem('cardSortSession') || localStorage.getItem('cardSortSession');
        if (!rawSession) return null;
        try {
          const parsed = JSON.parse(rawSession);
          if (publicToken && parsed.public_token !== publicToken) return null;
          parsed = hydrateSessionTemplate(parsed, null);
          return parsed;
        } catch (_error) {
          clearStoredSession();
          return null;
        }
      }

      async function loadPublicStudyContext() {
        if (!supabaseClient || !publicToken) return null;
        const { data, error } = await supabaseClient.rpc('get_public_study_context', {
          p_public_token: publicToken,
        });
        if (error) throw error;
        return Array.isArray(data) ? data[0] : data;
      }

      async function startParticipantSession(firstName, lastName) {
        if (!supabaseClient || !publicToken) {
          throw new Error('This study link is not configured correctly.');
        }
        const { data, error } = await supabaseClient.rpc('start_participant_session', {
          p_public_token: publicToken,
          p_first_name: firstName,
          p_last_name: lastName,
        });
        if (error) throw error;
        let nextSession = Array.isArray(data) ? data[0] : data;
        nextSession = hydrateSessionTemplate(nextSession, window.__cardSortStudyContext || null);
        persistSession(nextSession);
        return nextSession;
      }

      function buildDataFromTemplate(template) {
        const templateSettings = {
          allowCategoryEditing: template.allow_category_editing !== false,
          isRandomized: Boolean(template.is_randomized),
        };
        Object.assign(settings, templateSettings);
        const initialCards = settings.isRandomized ? shuffleArray(template.cards || []) : [...(template.cards || [])];
        data = { '#': initialCards, '?': saveSettings(settings) };
        for (const category of (template.categories || [])) {
          data[category] = [];
        }
      }

      function parseLooseArray(value) {
        if (Array.isArray(value)) return value.filter((item) => String(item || '').trim());
        if (typeof value !== 'string') return [];
        const trimmed = value.trim();
        if (!trimmed) return [];
        try {
          const parsed = JSON.parse(trimmed);
          if (Array.isArray(parsed)) return parsed.filter((item) => String(item || '').trim());
        } catch (_error) {}
        if (trimmed.startsWith('{') && trimmed.endsWith('}')) {
          return trimmed.slice(1, -1).split(',').map((item) => item.replace(/^"|"$/g, '').trim()).filter(Boolean);
        }
        return trimmed.split(/
|,/).map((item) => item.trim()).filter(Boolean);
      }

      function hydrateSessionTemplate(nextSession, fallbackContext) {
        nextSession.cards = parseLooseArray(nextSession.cards);
        nextSession.categories = parseLooseArray(nextSession.categories);

        if ((!nextSession.cards.length || !nextSession.categories.length) && fallbackContext) {
          if (!nextSession.study_name && fallbackContext.study_name) {
            nextSession.study_name = fallbackContext.study_name;
          }
          if (!nextSession.cards.length) {
            nextSession.cards = parseLooseArray(fallbackContext.cards || fallbackContext.template_cards || fallbackContext.card_texts);
          }
          if (!nextSession.categories.length) {
            nextSession.categories = parseLooseArray(fallbackContext.categories || fallbackContext.template_categories || fallbackContext.category_names);
          }
          if (typeof fallbackContext.allow_category_editing !== 'undefined') {
            nextSession.allow_category_editing = fallbackContext.allow_category_editing;
          }
          if (typeof fallbackContext.is_randomized !== 'undefined') {
            nextSession.is_randomized = fallbackContext.is_randomized;
          }
        }

        return nextSession;
      }

      function createCardElement(text) {
        const card = document.createElement('div');
        card.className = 'card';
        card.draggable = true;
        card.dataset.cardId = crypto.randomUUID ? crypto.randomUUID() : ('card_' + Math.random().toString(36).slice(2));
        card.dataset.text = text;

        const match = text.match(cardImageRegex);
        if (match) {
          const [before, imageUrl, after] = text.split(cardImageRegex);
          if (before && before.trim()) {
            const top = document.createElement('div');
            top.textContent = before.trim();
            card.appendChild(top);
          }
          const img = document.createElement('img');
          img.src = imageUrl;
          img.alt = '';
          card.appendChild(img);
          if (after && after.trim()) {
            const bottom = document.createElement('div');
            bottom.textContent = after.trim();
            card.appendChild(bottom);
          }
        } else {
          card.textContent = text;
        }

        card.addEventListener('dragstart', () => {
          dragCardId = card.dataset.cardId;
          card.classList.add('dragging');
        });
        card.addEventListener('dragend', () => {
          dragCardId = null;
          card.classList.remove('dragging');
          updateEmptyNotes();
          updateData();
        });
        return card;
      }

      function wireDropzone(dropzone) {
        dropzone.addEventListener('dragover', (event) => {
          event.preventDefault();
          dropzone.classList.add('drag-over');
        });
        dropzone.addEventListener('dragleave', () => {
          dropzone.classList.remove('drag-over');
        });
        dropzone.addEventListener('drop', (event) => {
          event.preventDefault();
          dropzone.classList.remove('drag-over');
          if (!dragCardId) return;
          const card = document.querySelector('[data-card-id="' + dragCardId + '"]');
          const list = dropzone.querySelector('.cards-list');
          if (card && list) {
            list.appendChild(card);
            updateEmptyNotes();
            updateData();
          }
        });
      }

      function ensureUniqueCategoryName(name, snapshot) {
        const base = (name || '').trim() || `Untitled ${++untitledSeed}`;
        let candidate = base;
        let counter = 2;
        while (Object.prototype.hasOwnProperty.call(snapshot, candidate)) {
          candidate = `${base} (${counter})`;
          counter += 1;
        }
        return candidate;
      }

      function createCategory(name = '', cards = []) {
        const category = document.createElement('section');
        category.className = 'category';

        const title = document.createElement('input');
        title.className = 'title';
        title.placeholder = 'Type a name';
        title.value = name || '';
        title.disabled = settings.allowCategoryEditing === false;
        title.addEventListener('input', updateData);

        const meta = document.createElement('div');
        meta.className = 'category-meta';
        meta.textContent = settings.allowCategoryEditing === false ? 'Fixed category' : 'Drop cards here';

        const dropzone = document.createElement('div');
        dropzone.className = 'column-dropzone';

        const list = document.createElement('div');
        list.className = 'cards-list';
        dropzone.appendChild(list);
        wireDropzone(dropzone);

        category.appendChild(title);
        category.appendChild(meta);
        category.appendChild(dropzone);
        categoriesBoard.appendChild(category);

        for (const text of cards || []) {
          list.appendChild(createCardElement(text));
        }

        updateEmptyNotes();
        updateData();
        return category;
      }

      function updateEmptyNotes() {
        document.querySelectorAll('.column-dropzone').forEach((dropzone) => {
          const list = dropzone.querySelector('.cards-list');
          let note = dropzone.querySelector('.empty-note');
          if (list.children.length === 0) {
            if (!note) {
              note = document.createElement('div');
              note.className = 'empty-note';
              note.textContent = 'Drop cards here';
              dropzone.appendChild(note);
            }
          } else if (note) {
            note.remove();
          }
        });
      }

      function updateData() {
        const nextData = {};

        document.querySelectorAll('.category').forEach((categoryElement) => {
          const rawName = categoryElement.querySelector('.title').value;
          const categoryName = ensureUniqueCategoryName(rawName, nextData);
          nextData[categoryName] = Array.from(categoryElement.querySelectorAll('.card')).map((card) => card.dataset.text);
        });

        nextData['#'] = Array.from(uncategorizedList.querySelectorAll('.card')).map((card) => card.dataset.text);
        nextData['?'] = saveSettings(settings);
        data = nextData;
      }

      function getCleanResult() {
        updateData();
        const cleanedData = {};
        for (const [key, value] of Object.entries(data)) {
          if (reservedKeys.includes(key)) continue;
          cleanedData[key] = value;
        }
        return cleanedData;
      }

      async function submitResult() {
        if (!supabaseClient || !session) {
          setStatus('Supabase session not available.', 'error');
          return;
        }

        try {
          setStatus('Submitting result...');
          const resultJson = getCleanResult();
          const { error } = await supabaseClient.rpc('submit_card_sort', {
            p_public_token: session.public_token,
            p_participant_id: session.participant_id,
            p_template_id: session.template_id,
            p_result_json: resultJson,
          });
          if (error) throw error;
          setStatus('Result submitted successfully.', 'success');
          sessionStorage.removeItem('cardSortSession');
          localStorage.removeItem('cardSortSession');
        } catch (error) {
          setStatus(error.message || 'Unable to submit the result.', 'error');
        }
      }

      function exportResult() {
        const resultJson = getCleanResult();
        downloadJson(`card-sort-${session?.participant_id || 'result'}.json`, resultJson);
      }

      function resetBoard() {
        boardReady = false;
        setToolbarEnabled(false);
        uncategorizedList.innerHTML = '';
        categoriesBoard.innerHTML = '';
        data = {};
      }

      async function bootFromSession() {
        session = hydrateSessionTemplate(session, window.__cardSortStudyContext || null);
        persistSession(session);
        studyHeading.textContent = session.study_name + ' · ' + session.participant_name;
        resetBoard();
        buildDataFromTemplate(session);

        for (const categoryName of Object.keys(data)) {
          if (reservedKeys.includes(categoryName) || categoryName === '#') continue;
          createCategory(categoryName, data[categoryName]);
        }

        for (const text of data['#'] || []) {
          uncategorizedList.appendChild(createCardElement(text));
        }

        if (document.querySelectorAll('.category').length === 0 && settings.allowCategoryEditing !== false) {
          createCategory();
          createCategory();
        }

        updateEmptyNotes();
        updateData();
        boardReady = true;
        setToolbarEnabled(true);
      }

      async function bootLegacy() {
        const legacyHash = window.location.hash.slice(1);
        if (!legacyHash) return false;
        const legacyData = await window.CardSortCommon.loadFromString(legacyHash);
        const legacySettings = loadSettings(legacyData);
        Object.assign(settings, legacySettings);
        session = {
          public_token: null,
          participant_id: null,
          template_id: null,
          study_name: 'Legacy card sort',
          participant_name: 'Legacy session',
        };
        studyHeading.textContent = 'Legacy card sort';
        data = legacyData;
        if (!Array.isArray(data['#'])) data['#'] = [];
        if (!data['?']) data['?'] = saveSettings(settings);
        resetBoard();

        for (const categoryName of Object.keys(data)) {
          if (reservedKeys.includes(categoryName) || categoryName === '#') continue;
          createCategory(categoryName, data[categoryName]);
        }
        for (const text of data['#'] || []) {
          uncategorizedList.appendChild(createCardElement(text));
        }
        if (document.querySelectorAll('.category').length === 0 && settings.allowCategoryEditing !== false) {
          createCategory();
          createCategory();
        }
        updateEmptyNotes();
        updateData();
        boardReady = true;
        setToolbarEnabled(true);
        setStatus('Drag cards into categories, then submit when finished.');
        return true;
      }

      async function boot() {
        setToolbarEnabled(false);
        wireDropzone(document.getElementById('uncategorized-dropzone'));

        if (await bootLegacy()) return;

        if (!publicToken) {
          setStatus('This page expects a study link with a token.', 'error');
          return;
        }

        session = getStoredSession();
        if (session) {
          hideStartGate();
          await bootFromSession();
          setStatus('Drag cards into categories, then submit when finished.');
          return;
        }

        clearStoredSession();

        try {
          const studyContext = await loadPublicStudyContext();
          window.__cardSortStudyContext = studyContext || null;
          if (!studyContext) {
            setStatus('This study link is invalid or inactive.', 'error');
            return;
          }
          showStartGate(
            studyContext.study_name || 'Start card sort',
            'Enter your first and last name to begin this study.'
          );
          setStartFormStatus('');
          document.getElementById('participant-first-name').focus();
          setStatus('Enter your name to begin.');
        } catch (error) {
          setStatus(error.message || 'Unable to load this study.', 'error');
        }
      }

      buttonCreateCategory.addEventListener('click', () => {
        if (!boardReady) {
          setStatus('The study board has not loaded yet.', 'error');
          return;
        }
        if (settings.allowCategoryEditing === false) {
          setStatus('This study uses fixed categories, so new categories cannot be added.', 'error');
          return;
        }
        createCategory();
      });
      buttonSubmitResult.addEventListener('click', submitResult);
      buttonExportResult.addEventListener('click', exportResult);

      startForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const firstName = document.getElementById('participant-first-name').value.trim();
        const lastName = document.getElementById('participant-last-name').value.trim();
        if (!firstName || !lastName) {
          setStartFormStatus('Enter your first and last name to continue.', 'error');
          return;
        }
        try {
          startFormButton.disabled = true;
          setStartFormStatus('Starting session...');
          session = await startParticipantSession(firstName, lastName);
          hideStartGate();
          await bootFromSession();
          setStatus('Drag cards into categories, then submit when finished.');
        } catch (error) {
          setStartFormStatus(error.message || 'Unable to start this study.', 'error');
        } finally {
          startFormButton.disabled = false;
        }
      });

      window.addEventListener('error', (event) => {
        const message = event?.error?.message || event?.message || 'An unexpected error occurred while loading the study.';
        setStatus(message, 'error');
      });

      boot().catch((error) => {
        setStatus(error.message || 'Unable to load this study.', 'error');
        setToolbarEnabled(false);
      });
    </script>
  </body>
</html>
